<title>Pimenta Importes</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0a0a0a;
    color:white;
}

header {
    background: linear-gradient(90deg,#8b0000,#ff0000);
    padding:20px;
    text-align:center;
}

.logo {
    width:80px;
}

h1 {
    margin:10px 0 0;
}

.container {
    max-width:500px;
    margin:auto;
    padding:20px;
}

.card {
    background:#111;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(255,0,0,0.2);
    margin-bottom:20px;
}

.whatsapp {
    display:block;
    text-align:center;
    background:#25D366;
    padding:14px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    font-weight:bold;
    margin-top:10px;
}

.stars span {
    font-size:32px;
    cursor:pointer;
}

textarea {
    width:100%;
    height:80px;
    margin-top:10px;
    border-radius:8px;
    border:none;
    padding:10px;
}

button {
    margin-top:10px;
    padding:12px;
    width:100%;
    background:#ff0000;
    border:none;
    border-radius:8px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.review {
    background:#1a1a1a;
    margin-top:10px;
    padding:10px;
    border-radius:8px;
}
</style>
